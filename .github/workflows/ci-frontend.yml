# ============================================================
# LogisticOS — Frontend CI Pipeline
# ============================================================
# Covers all Next.js portals and React Native mobile apps.
# Jobs: lint-and-type-check → test → build → e2e → mobile-check
# Package manager: npm (each app has its own package-lock.json)
# ============================================================

name: CI — Frontend

on:
  push:
    branches:
      - "**"
    paths:
      - "apps/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    paths:
      - "apps/**"
      - ".github/workflows/ci-frontend.yml"

concurrency:
  group: ci-frontend-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: lint-and-type-check
  # Runs ESLint + TypeScript compiler (noEmit) per web portal.
  # ──────────────────────────────────────────────────────────────
  lint-and-type-check:
    name: Lint & Type Check (${{ matrix.app }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        app:
          - merchant-portal
          - admin-portal
          - partner-portal
          - customer-portal

    defaults:
      run:
        working-directory: apps/${{ matrix.app }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: apps/${{ matrix.app }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ matrix.app }}-${{ hashFiles(format('apps/{0}/package-lock.json', matrix.app)) }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ matrix.app }}-

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Check for console.log in production code
        run: |
          VIOLATIONS=$(grep -rn 'console\.log(' src/ \
            --include='*.ts' --include='*.tsx' \
            | grep -v '\.test\.' | grep -v '\.spec\.' | grep -v '__tests__' \
            | grep -v '// eslint-disable' | head -20 || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "WARNING: console.log found in production code:"
            echo "$VIOLATIONS"
          fi

      - name: Validate i18n key consistency
        run: |
          if [ -f "src/locales/en.json" ] && [ -f "src/locales/ph.json" ]; then
            EN_KEYS=$(python3 -c "import json; d=json.load(open('src/locales/en.json')); print('\n'.join(sorted(d.keys())))" 2>/dev/null || true)
            PH_KEYS=$(python3 -c "import json; d=json.load(open('src/locales/ph.json')); print('\n'.join(sorted(d.keys())))" 2>/dev/null || true)
            MISSING=$(comm -23 <(echo "$EN_KEYS" | sort) <(echo "$PH_KEYS" | sort) 2>/dev/null || true)
            if [ -n "$MISSING" ]; then
              echo "WARNING: Missing Filipino (ph) translations for keys:"
              echo "$MISSING"
            fi
          fi

  # ──────────────────────────────────────────────────────────────
  # JOB 2: test
  # Runs Jest unit/component tests with coverage per portal.
  # ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        app:
          - merchant-portal
          - admin-portal
          - partner-portal
          - customer-portal

    defaults:
      run:
        working-directory: apps/${{ matrix.app }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --ci --passWithNoTests
        env:
          CI: "true"
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_ENV: "test"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: github.event_name == 'pull_request'
        with:
          files: coverage/lcov.info
          flags: frontend-${{ matrix.app }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.app }}-${{ github.sha }}
          path: apps/${{ matrix.app }}/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────
  # JOB 3: build
  # Runs Next.js production build per portal.
  # Validates that output: "standalone" artifact is produced.
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        app:
          - merchant-portal
          - admin-portal
          - partner-portal
          - customer-portal

    defaults:
      run:
        working-directory: apps/${{ matrix.app }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: apps/${{ matrix.app }}/.next/cache
          key: ${{ runner.os }}-nextjs-build-${{ matrix.app }}-${{ hashFiles(format('apps/{0}/package-lock.json', matrix.app)) }}-${{ hashFiles(format('apps/{0}/src/**', matrix.app)) }}
          restore-keys: |
            ${{ runner.os }}-nextjs-build-${{ matrix.app }}-

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://api.logisticos.io' }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
          NEXT_PUBLIC_APP_ENV: "production"
          NODE_ENV: "production"

      - name: Verify standalone output exists
        run: |
          if [ ! -f ".next/standalone/server.js" ]; then
            echo "ERROR: .next/standalone/server.js not found."
            echo "Ensure next.config has output: 'standalone'"
            exit 1
          fi
          echo "Standalone build verified."

      - name: Analyze bundle size (warn on chunks > 500KB)
        run: |
          find .next/static/chunks -name '*.js' -size +500k \
            -exec echo "LARGE BUNDLE (>500KB): {}" \; 2>/dev/null || true

      - name: Upload standalone build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.app }}-${{ github.sha }}
          path: |
            apps/${{ matrix.app }}/.next/standalone/
            apps/${{ matrix.app }}/.next/static/
            apps/${{ matrix.app }}/public/
          retention-days: 1
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────
  # JOB 4: e2e
  # Runs Playwright end-to-end tests for all web portals.
  # ──────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        app:
          - merchant-portal
          - admin-portal
          - partner-portal
          - customer-portal

    container:
      image: mcr.microsoft.com/playwright:v1.44.0-jammy
      options: --ipc=host

    env:
      CI: "true"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.app }}-${{ github.sha }}
          path: apps/${{ matrix.app }}-build/

      - name: Start application server
        working-directory: apps/${{ matrix.app }}
        run: |
          STANDALONE_DIR="../${{ matrix.app }}-build"
          if [ -f "$STANDALONE_DIR/server.js" ]; then
            PORT=3000 node "$STANDALONE_DIR/server.js" &
          else
            npm run build && npm start &
          fi
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && break
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Application server ready."
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.INTEGRATION_API_URL || 'http://localhost:8000' }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}

      - name: Run Playwright E2E tests
        working-directory: apps/${{ matrix.app }}
        run: npx playwright test --reporter=html --reporter=github tests/e2e/ || true
        env:
          BASE_URL: "http://localhost:3000"
          TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
          TEST_TENANT_ID: ${{ secrets.E2E_TEST_TENANT_ID }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.app }}-${{ github.sha }}
          path: |
            apps/${{ matrix.app }}/playwright-report/
            apps/${{ matrix.app }}/test-results/
          retention-days: 7
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────
  # JOB 5: mobile-check
  # TypeScript + ESLint + Expo Doctor for driver-app and customer-app.
  # ──────────────────────────────────────────────────────────────
  mobile-check:
    name: Mobile Check (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        app:
          - driver-app
          - customer-app

    defaults:
      run:
        working-directory: apps/${{ matrix.app }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        env:
          CI: "true"

      - name: Run ESLint
        run: npm run lint
        env:
          CI: "true"

      - name: Run Expo Doctor
        run: npx expo-doctor
        continue-on-error: true

      - name: Validate app.json
        run: |
          if [ -f "app.json" ]; then
            python3 -c "
          import json, sys
          try:
              d = json.load(open('app.json'))
              exp = d.get('expo', {})
              assert exp.get('name'), 'Missing expo.name'
              assert exp.get('slug'), 'Missing expo.slug'
              assert exp.get('version'), 'Missing expo.version'
              print('app.json validation passed')
          except (AssertionError, KeyError) as e:
              print(f'app.json validation failed: {e}', file=sys.stderr)
              sys.exit(1)
          "
          fi

      - name: Run unit tests (mobile)
        run: npm test -- --ci --passWithNoTests
        env:
          CI: "true"
          NODE_ENV: "test"

  # ──────────────────────────────────────────────────────────────
  # Summary gate — required by branch protection rules
  # ──────────────────────────────────────────────────────────────
  frontend-ci-complete:
    name: Frontend CI Complete
    runs-on: ubuntu-latest
    needs:
      - lint-and-type-check
      - test
      - build
      - e2e
      - mobile-check
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          LINT="${{ needs.lint-and-type-check.result }}"
          TEST="${{ needs.test.result }}"
          BUILD="${{ needs.build.result }}"
          E2E="${{ needs.e2e.result }}"
          MOBILE="${{ needs.mobile-check.result }}"

          echo "lint-and-type-check: $LINT"
          echo "test:               $TEST"
          echo "build:              $BUILD"
          echo "e2e:                $E2E"
          echo "mobile-check:       $MOBILE"

          for RESULT in "$LINT" "$TEST" "$BUILD"; do
            if [ "$RESULT" == "failure" ] || [ "$RESULT" == "cancelled" ]; then
              echo "Required frontend CI job failed."
              exit 1
            fi
          done
          echo "All frontend CI checks passed."
