name: Deploy to Staging

on:
  push:
    branches: [develop]

jobs:
  deploy:
    name: Deploy Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-southeast-1

      - name: Update kubeconfig (EKS)
        run: aws eks update-kubeconfig --name logisticos-staging --region ap-southeast-1

      - name: Set image tags in Helm values
        run: |
          for svc in identity api-gateway order-intake dispatch driver-ops engagement payments; do
            helm upgrade --install logisticos-${svc} \
              infra/kubernetes/helm/charts/${svc} \
              --namespace logisticos-staging \
              --set image.tag=${{ github.sha }} \
              --set image.repository=ghcr.io/${{ github.repository_owner }}/logisticos-${svc} \
              --wait \
              --timeout 5m
          done

      - name: Run smoke tests
        run: |
          GATEWAY=https://api.staging.logisticos.app
          curl -f "${GATEWAY}/health" || exit 1
          echo "Staging smoke test passed"

      - name: Notify team (Slack)
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Staging deploy ${{ job.status }}: ${{ github.sha }} by ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
