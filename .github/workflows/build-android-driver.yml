name: Build Android Driver App

on:
  push:
    branches: [master]
    paths:
      - "apps/driver-app-android/**"
      - ".github/workflows/build-android-driver.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build stagingRelease APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/driver-app-android/**/*.gradle*', 'apps/driver-app-android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Write google-services.json
        working-directory: apps/driver-app-android/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        # Python reads the env var verbatim (no shell quoting/escaping).
        # If the secret is stored as base64, decode it first; otherwise
        # write it directly. The inner try/except handles both forms.
        run: |
          python3 - <<'PYEOF'
          import os, base64, json, sys
          raw = os.environ["GOOGLE_SERVICES_JSON"]
          # Try base64 first (handles secrets stored with `base64 -w 0`)
          try:
              decoded = base64.b64decode(raw).decode("utf-8")
              json.loads(decoded)   # validate
              content = decoded
          except Exception:
              # Fall back to raw value (secret stored as plain JSON text)
              content = raw
          with open("google-services.json", "w") as f:
              f.write(content)
          print(f"google-services.json written ({len(content)} bytes)")
          PYEOF

      - name: Write local.properties
        working-directory: apps/driver-app-android
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}" >> local.properties
          echo "MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}" >> local.properties

      - name: Bump versionCode
        working-directory: apps/driver-app-android
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ github.run_number }}/" app/build.gradle.kts

      - name: Build stagingRelease APK
        working-directory: apps/driver-app-android
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleStagingRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: driver-app-staging-release-${{ github.run_number }}
          path: apps/driver-app-android/app/build/outputs/apk/staging/release/*.apk
          retention-days: 30

      - name: Upload APK to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/driver-app-android/app/build/outputs/apk/staging/release/*.apk
