name: Build & Push Images to GHCR

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      build_all:
        description: "Force rebuild of every service + portal (ignore path filters)"
        type: boolean
        default: false

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # ── Detect which services/portals actually need a rebuild ───────────────
  # Without this, a docs-only or driver-app-only commit forces all 23 image
  # builds. dorny/paths-filter compares the push range against per-path
  # globs and emits a JSON array consumed by the matrix `if:` below.
  #
  # "Shared" paths (workspace Cargo.toml, libs/**, Dockerfile bases, the
  # workflow file itself) trigger a full rebuild — anything that affects
  # all Rust services at once.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      build_all:           ${{ steps.dispatch.outputs.build_all || steps.shared.outputs.shared }}
      services_to_build:   ${{ steps.collect.outputs.services }}
      portals_to_build:    ${{ steps.collect.outputs.portals }}
    steps:
      - uses: actions/checkout@v4
        with:
          # paths-filter needs prior commit to diff against on push events
          fetch-depth: 2

      - name: Honor manual force-build dispatch
        id: dispatch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.build_all }}" = "true" ]; then
            echo "build_all=true" >> "$GITHUB_OUTPUT"
          fi

      # First filter: shared infra. If any of these touched, every service
      # needs to rebuild (libs/auth changes break ABI for all consumers,
      # Cargo.lock affects every Rust crate's resolution, etc.).
      - name: Detect shared/infra changes
        id: shared_detect
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'libs/**'
              - '.github/workflows/build-images.yml'
              - 'docker-compose.yml'

      - name: Set shared output
        id: shared
        run: |
          if [ "${{ steps.shared_detect.outputs.shared }}" = "true" ]; then
            echo "shared=true" >> "$GITHUB_OUTPUT"
          fi

      # Per-service + per-portal filters. Each filter tracks one image's
      # source tree. The output object has one boolean key per filter name.
      - name: Detect per-image changes
        id: per_image
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api-gateway:        'services/api-gateway/**'
            identity:           'services/identity/**'
            cdp:                'services/cdp/**'
            engagement:         'services/engagement/**'
            order-intake:       'services/order-intake/**'
            dispatch:           'services/dispatch/**'
            driver-ops:         'services/driver-ops/**'
            delivery-experience: 'services/delivery-experience/**'
            fleet:              'services/fleet/**'
            hub-ops:            'services/hub-ops/**'
            carrier:            'services/carrier/**'
            pod:                'services/pod/**'
            payments:           'services/payments/**'
            analytics:          'services/analytics/**'
            marketing:          'services/marketing/**'
            business-logic:     'services/business-logic/**'
            ai-layer:           'services/ai-layer/**'
            compliance:         'services/compliance/**'
            admin-portal:       'apps/admin-portal/**'
            merchant-portal:    'apps/merchant-portal/**'
            customer-portal:    'apps/customer-portal/**'
            partner-portal:     'apps/partner-portal/**'
            landing:            'apps/landing/**'

      # Collapse the per-filter booleans into two JSON arrays — one for
      # services, one for portals — that the build matrices consume via
      # `contains(fromJSON(...), matrix.X)`. JSON arrays are the only
      # output shape that survives YAML expression context cleanly when
      # the keyset is dynamic.
      # Collapse the per-filter booleans into two JSON arrays — one for
      # services, one for portals. The build-rust + build-portals jobs
      # then expand their matrix from these arrays via fromJSON, so an
      # empty array means zero matrix entries (no jobs spun up). When
      # `build_all` is on, every service+portal goes into the array
      # regardless of paths-filter — keeps the manual force-rebuild
      # path simple.
      - name: Collect changed images
        id: collect
        env:
          BUILD_ALL:           ${{ steps.dispatch.outputs.build_all || steps.shared.outputs.shared || 'false' }}
          API_GATEWAY:         ${{ steps.per_image.outputs.api-gateway }}
          IDENTITY:            ${{ steps.per_image.outputs.identity }}
          CDP:                 ${{ steps.per_image.outputs.cdp }}
          ENGAGEMENT:          ${{ steps.per_image.outputs.engagement }}
          ORDER_INTAKE:        ${{ steps.per_image.outputs.order-intake }}
          DISPATCH:            ${{ steps.per_image.outputs.dispatch }}
          DRIVER_OPS:          ${{ steps.per_image.outputs.driver-ops }}
          DELIVERY_EXPERIENCE: ${{ steps.per_image.outputs.delivery-experience }}
          FLEET:               ${{ steps.per_image.outputs.fleet }}
          HUB_OPS:             ${{ steps.per_image.outputs.hub-ops }}
          CARRIER:             ${{ steps.per_image.outputs.carrier }}
          POD:                 ${{ steps.per_image.outputs.pod }}
          PAYMENTS:            ${{ steps.per_image.outputs.payments }}
          ANALYTICS:           ${{ steps.per_image.outputs.analytics }}
          MARKETING:           ${{ steps.per_image.outputs.marketing }}
          BUSINESS_LOGIC:      ${{ steps.per_image.outputs.business-logic }}
          AI_LAYER:            ${{ steps.per_image.outputs.ai-layer }}
          COMPLIANCE:          ${{ steps.per_image.outputs.compliance }}
          ADMIN_PORTAL:        ${{ steps.per_image.outputs.admin-portal }}
          MERCHANT_PORTAL:     ${{ steps.per_image.outputs.merchant-portal }}
          CUSTOMER_PORTAL:     ${{ steps.per_image.outputs.customer-portal }}
          PARTNER_PORTAL:      ${{ steps.per_image.outputs.partner-portal }}
          LANDING:             ${{ steps.per_image.outputs.landing }}
        run: |
          set -e
          services=()
          portals=()
          if [ "$BUILD_ALL" = "true" ]; then
            services=('"api-gateway"' '"identity"' '"cdp"' '"engagement"' '"order-intake"' '"dispatch"' '"driver-ops"' '"delivery-experience"' '"fleet"' '"hub-ops"' '"carrier"' '"pod"' '"payments"' '"analytics"' '"marketing"' '"business-logic"' '"ai-layer"' '"compliance"')
            portals=('"admin-portal"' '"merchant-portal"' '"customer-portal"' '"partner-portal"' '"landing"')
          else
            [ "$API_GATEWAY"         = "true" ] && services+=('"api-gateway"') || true
            [ "$IDENTITY"            = "true" ] && services+=('"identity"') || true
            [ "$CDP"                 = "true" ] && services+=('"cdp"') || true
            [ "$ENGAGEMENT"          = "true" ] && services+=('"engagement"') || true
            [ "$ORDER_INTAKE"        = "true" ] && services+=('"order-intake"') || true
            [ "$DISPATCH"            = "true" ] && services+=('"dispatch"') || true
            [ "$DRIVER_OPS"          = "true" ] && services+=('"driver-ops"') || true
            [ "$DELIVERY_EXPERIENCE" = "true" ] && services+=('"delivery-experience"') || true
            [ "$FLEET"               = "true" ] && services+=('"fleet"') || true
            [ "$HUB_OPS"             = "true" ] && services+=('"hub-ops"') || true
            [ "$CARRIER"             = "true" ] && services+=('"carrier"') || true
            [ "$POD"                 = "true" ] && services+=('"pod"') || true
            [ "$PAYMENTS"            = "true" ] && services+=('"payments"') || true
            [ "$ANALYTICS"           = "true" ] && services+=('"analytics"') || true
            [ "$MARKETING"           = "true" ] && services+=('"marketing"') || true
            [ "$BUSINESS_LOGIC"      = "true" ] && services+=('"business-logic"') || true
            [ "$AI_LAYER"            = "true" ] && services+=('"ai-layer"') || true
            [ "$COMPLIANCE"          = "true" ] && services+=('"compliance"') || true
            [ "$ADMIN_PORTAL"        = "true" ] && portals+=('"admin-portal"') || true
            [ "$MERCHANT_PORTAL"     = "true" ] && portals+=('"merchant-portal"') || true
            [ "$CUSTOMER_PORTAL"     = "true" ] && portals+=('"customer-portal"') || true
            [ "$PARTNER_PORTAL"      = "true" ] && portals+=('"partner-portal"') || true
            [ "$LANDING"             = "true" ] && portals+=('"landing"') || true
          fi
          echo "services=[$(IFS=,; echo "${services[*]}")]" >> "$GITHUB_OUTPUT"
          echo "portals=[$(IFS=,; echo "${portals[*]}")]" >> "$GITHUB_OUTPUT"

  # ── Build only the Rust services whose source paths changed ─────────────
  # Dynamic matrix from `changes.collect.outputs.services` — empty array
  # produces zero matrix entries and the entire job is skipped. The
  # job-level `if:` is a belt-and-suspenders guard for the empty-array
  # case (some Actions runners reject `matrix: []`).
  build-rust:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.services_to_build != '[]'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services_to_build) }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/logisticos-service-${{ matrix.service }}:latest
            ghcr.io/${{ env.OWNER }}/logisticos-service-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=rust-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=rust-${{ matrix.service }}

  # ── Build only the portals whose source paths changed ───────────────────
  build-portals:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.portals_to_build != '[]'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.portals_to_build) }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/logisticos-app-${{ matrix.app }}:latest
            ghcr.io/${{ env.OWNER }}/logisticos-app-${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha,scope=portal-${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=portal-${{ matrix.app }}
