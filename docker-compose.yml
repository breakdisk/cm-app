networks:
  logisticos:
    driver: bridge
  dokploy-network:
    external: true
volumes:
  postgres_data: null
  redis_data: null
  kafka_data: null
  clickhouse_data: null
  grafana_data: null
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: logisticos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: logisticos
      POSTGRES_PASSWORD: password
      POSTGRES_DB: logisticos
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - logisticos
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U logisticos
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: logisticos-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - logisticos
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: logisticos-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - logisticos
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: logisticos-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - logisticos
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: logisticos-clickhouse
    restart: unless-stopped
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - logisticos
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: logisticos-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - logisticos
  grafana:
    image: grafana/grafana:10.4.0
    container_name: logisticos-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - logisticos
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: logisticos-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - logisticos
  mailhog:
    image: mailhog/mailhog:latest
    container_name: logisticos-mailhog
    networks:
      - logisticos
  minio:
    image: minio/minio:latest
    container_name: logisticos-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9002"
    networks:
      - logisticos
  api-gateway:
    image: ghcr.io/breakdisk/logisticos-service-api-gateway:latest
    container_name: logisticos-api-gateway
    restart: unless-stopped
    ports:
      - 8000:8000
    environment:
      APP__HOST: "0.0.0.0"
      APP__PORT: "8000"
      APP__ENV: development
      AUTH__JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-REPLACE-WITH-32CHAR-RANDOM-VALUE-123}
      AUTH__JWT_EXPIRY_SECONDS: "3600"
      AUTH__REFRESH_TOKEN_EXPIRY_SECONDS: "86400"
      REDIS__URL: redis://redis:6379
      SERVICES__IDENTITY_URL: http://identity:8001
      SERVICES__CDP_URL: http://cdp:8002
      SERVICES__ENGAGEMENT_URL: http://engagement:8003
      SERVICES__ORDER_INTAKE_URL: http://order-intake:8004
      SERVICES__DISPATCH_URL: http://dispatch:8005
      SERVICES__DRIVER_OPS_URL: http://driver-ops:8006
      SERVICES__DELIVERY_EXPERIENCE_URL: http://delivery-experience:8007
      SERVICES__FLEET_URL: http://fleet:8008
      SERVICES__HUB_OPS_URL: http://hub-ops:8009
      SERVICES__CARRIER_URL: http://carrier:8010
      SERVICES__POD_URL: http://pod:8011
      SERVICES__PAYMENTS_URL: http://payments:8012
      SERVICES__ANALYTICS_URL: http://analytics:8013
      SERVICES__MARKETING_URL: http://marketing:8014
      SERVICES__BUSINESS_LOGIC_URL: http://business-logic:8015
      SERVICES__AI_LAYER_URL: http://ai-layer:8016
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - logisticos
      - dokploy-network
    # Routing is owned by the Traefik file provider, not container labels.
    # Source of truth: infra/traefik/dynamic/oscargomarketnet-logisticosbackend-pqfh0u.yml
    # (deployed to /etc/dokploy/traefik/dynamic/ on the VPS).
    # Dokploy's Traefik ignores docker labels for this stack — see commit history
    # and docs/adr/0009 for context.
    healthcheck:
      test:
        - CMD-SHELL
        - curl -sf http://localhost:8000/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
