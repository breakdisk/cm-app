      SERVICES__BUSINESS_LOGIC_URL: http://business-logic:8015
      SERVICES__AI_LAYER_URL: http://ai-layer:8016
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - logisticos
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
