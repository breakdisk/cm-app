version: "3.9"

# ============================================================
# LogisticOS — Local Development Stack
# ============================================================

networks:
  logisticos:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  clickhouse_data:
  grafana_data:

services:

  # ──────────────────────────────────────────────────────────
  # PostgreSQL — Primary relational DB (all services)
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: logisticos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: logisticos
      POSTGRES_PASSWORD: password
      POSTGRES_DB: logisticos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - logisticos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logisticos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # Redis — Cache, sessions, pub/sub, rate limiting
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: logisticos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - logisticos
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # Zookeeper (Kafka dependency)
  # ──────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: logisticos-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - logisticos

  # ──────────────────────────────────────────────────────────
  # Kafka — Event streaming
  # ──────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: logisticos-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - logisticos

  # ──────────────────────────────────────────────────────────
  # ClickHouse — Analytics warehouse
  # ──────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: logisticos-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - logisticos
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ──────────────────────────────────────────────────────────
  # Prometheus — Metrics scraping
  # ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: logisticos-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - logisticos

  # ──────────────────────────────────────────────────────────
  # Grafana — Dashboards
  # ──────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: logisticos-grafana
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - logisticos

  # ──────────────────────────────────────────────────────────
  # Jaeger — Distributed tracing (OpenTelemetry)
  # ──────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: logisticos-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - logisticos

  # ──────────────────────────────────────────────────────────
  # Mailhog — Local email testing
  # ──────────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: logisticos-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - logisticos

  # ──────────────────────────────────────────────────────────
  # MinIO — Local S3-compatible object storage
  # ──────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: logisticos-minio
    restart: unless-stopped
    ports:
      - "9001:9001"
      - "9002:9002"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9002"
    networks:
      - logisticos

