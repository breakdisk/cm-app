version: "3.9"
networks:
  logisticos:
    driver: bridge
  dokploy-network:
    external: true
volumes:
  postgres_data: null
  redis_data: null
  kafka_data: null
  clickhouse_data: null
  grafana_data: null
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: logisticos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: logisticos
      POSTGRES_PASSWORD: password
      POSTGRES_DB: logisticos
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - logisticos
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U logisticos
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: logisticos-redis
    restart: unless-stopped
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    networks:
      - logisticos
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: logisticos-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - logisticos
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: logisticos-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - logisticos
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: logisticos-clickhouse
    restart: unless-stopped
    ports:
      - 8123:8123
      - 9000:9000
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - logisticos
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: logisticos-prometheus
    restart: unless-stopped
    ports:
      - 9090:9090
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - logisticos
  grafana:
    image: grafana/grafana:10.4.0
    container_name: logisticos-grafana
    restart: unless-stopped
    ports:
      - 3100:3000
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - logisticos
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: logisticos-jaeger
    restart: unless-stopped
    ports:
      - 16686:16686
      - 4317:4317
      - 4318:4318
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - logisticos
  mailhog:
    image: mailhog/mailhog:latest
    container_name: logisticos-mailhog
    ports:
      - 1025:1025
      - 8025:8025
    networks:
      - logisticos
  minio:
    image: minio/minio:latest
    container_name: logisticos-minio
    restart: unless-stopped
    ports:
      - 9001:9001
      - 9002:9002
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9002"
    networks:
      - logisticos
  api-gateway:
    image: ghcr.io/breakdisk/logisticos-service-api-gateway:latest
    container_name: logisticos-api-gateway
    restart: unless-stopped
    ports:
      - 8000:8000
    environment:
      DATABASE_URL: postgres://logisticos:password@postgres:5432/logisticos
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      RUST_LOG: info
      SERVICE_PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - logisticos
    healthcheck:
      test:
        - CMD-SHELL
        - curl -sf http://localhost:8000/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
  identity:
    image: ghcr.io/breakdisk/logisticos-service-identity:latest
    container_name: logisticos-identity
    restart: unless-stopped
    ports:
      - 8001:8001
    environment:
      DATABASE_URL: postgres://logisticos:password@postgres:5432/logisticos
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      RUST_LOG: info
      SERVICE_PORT: "8001"
      JWT_SECRET: dev-jwt-secret-change-in-production
