  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: logisticos-kafka-ui
    profiles:
      - tools
    depends_on:
      - kafka
    ports:
      - 9093:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - logisticos
  pgadmin:
    image: dpage/pgadmin4:8.5
    container_name: logisticos-pgadmin
    profiles:
      - tools
    ports:
      - 5050:80
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@logisticos.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - logisticos
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: logisticos-redis-insight
    profiles:
      - tools
    ports:
      - 5540:5540
    networks:
      - logisticos
