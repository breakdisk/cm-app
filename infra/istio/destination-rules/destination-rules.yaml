# LogisticOS Istio DestinationRules
#
# Defines traffic policy, connection pooling, circuit breaking, and subset
# definitions for all 17 LogisticOS microservices.
#
# Key policies applied to every service:
#
#   connectionPool:
#     tcp.maxConnections: 1000        — cap total TCP connections per sidecar
#     http.http1MaxPendingRequests: 1000 — queue depth before circuit breaks
#     http.http2MaxRequests: 10000    — gRPC / HTTP/2 concurrency ceiling
#
#   outlierDetection (circuit breaker):
#     consecutive5xxErrors: 5         — 5 consecutive 5xx ejects endpoint
#     interval: 30s                   — rolling window for error counting
#     baseEjectionTime: 30s           — minimum ejection duration
#     maxEjectionPercent: 50          — at most half the endpoints ejected
#     minHealthPercent: 30            — stop ejecting if < 30% hosts healthy
#
#   loadBalancer: LEAST_CONN         — distributes load by least active connections;
#                                      better than ROUND_ROBIN for heterogeneous RPC latency
#
#   tls.mode: ISTIO_MUTUAL           — enforces mTLS between all sidecar pairs;
#                                      certificates managed by Istiod (SPIFFE/SVID)
#
# Subset labels:
#   stable: version=stable           — production pods
#   canary: version=canary           — canary/shadow pods (0 traffic by default)
#
# Analytics exception:
#   maxConnections: 5000 (TCP) and http2MaxRequests: 50000 to accommodate
#   high-concurrency ClickHouse query fan-out from the analytics service.

---
# =============================================================================
# LOGISTICOS-CORE NAMESPACE
# =============================================================================

apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: api-gateway-dr
  namespace: logisticos-core
  labels:
    app: api-gateway
    component: destination-rule
    managed-by: istio
  annotations:
    logisticos.io/description: "Traffic policy for api-gateway service"
spec:
  host: api-gateway.logisticos-core.svc.cluster.local
  trafficPolicy:
    loadBalancer:
      simple: LEAST_CONN
    connectionPool:
      tcp:
        maxConnections: 1000
        connectTimeout: 10s
        tcpKeepalive:
          time: 7200s
          interval: 75s
          probes: 10
      http:
        http1MaxPendingRequests: 1000
        http2MaxRequests: 10000
        maxRequestsPerConnection: 1000
        maxRetries: 5
        idleTimeout: 90s
        h2UpgradePolicy: UPGRADE
    outlierDetection:
      consecutive5xxErrors: 5
      consecutiveGatewayErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 30
      splitExternalLocalOriginErrors: true
    tls:
      mode: ISTIO_MUTUAL
  subsets:
    - name: stable
      labels:
        version: stable
      trafficPolicy:
        loadBalancer:
          simple: LEAST_CONN
        tls:
          mode: ISTIO_MUTUAL
    - name: canary
      labels:
        version: canary
      trafficPolicy:
        loadBalancer:
          simple: LEAST_CONN
        tls:
          mode: ISTIO_MUTUAL

