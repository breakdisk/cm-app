apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: ai-layer-dr
  namespace: logisticos-ai
  labels:
    app: ai-layer
    component: destination-rule
    managed-by: istio
  annotations:
    logisticos.io/description: "Traffic policy for ai-layer service"
    logisticos.io/security-note: "Only accepts inbound from logisticos-core — see AuthorizationPolicy in mtls.yaml"
spec:
  host: ai-layer.logisticos-ai.svc.cluster.local
  trafficPolicy:
    loadBalancer:
      simple: LEAST_CONN
    connectionPool:
      tcp:
        maxConnections: 1000
        connectTimeout: 10s
        tcpKeepalive:
          time: 7200s
          interval: 75s
          probes: 10
      http:
        http1MaxPendingRequests: 1000
        http2MaxRequests: 10000
        maxRequestsPerConnection: 1000
        maxRetries: 3
        # Longer idle timeout — agent sessions are long-lived
        idleTimeout: 300s
        h2UpgradePolicy: UPGRADE
    outlierDetection:
      consecutive5xxErrors: 5
      consecutiveGatewayErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 30
      splitExternalLocalOriginErrors: true
    tls:
      mode: ISTIO_MUTUAL
  subsets:
    - name: stable
      labels:
        version: stable
      trafficPolicy:
        loadBalancer:
          simple: LEAST_CONN
        tls:
          mode: ISTIO_MUTUAL
    - name: canary
      labels:
        version: canary
      trafficPolicy:
        loadBalancer:
          simple: LEAST_CONN
        tls:
          mode: ISTIO_MUTUAL
