---
# Analytics — SPECIAL CASE: 5x higher connection limits for ClickHouse query load.
# The analytics service fans out queries across multiple ClickHouse shards and may
# open many concurrent connections. Standard limits would cause false circuit trips.
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: analytics-dr
  namespace: logisticos-data
  labels:
    app: analytics
    component: destination-rule
    managed-by: istio
  annotations:
    logisticos.io/description: "Traffic policy for analytics service — elevated limits for ClickHouse"
    logisticos.io/perf-note: "maxConnections=5000, http2MaxRequests=50000 to support ClickHouse fan-out"
spec:
  host: analytics.logisticos-data.svc.cluster.local
  trafficPolicy:
    loadBalancer:
      simple: LEAST_CONN
    connectionPool:
      tcp:
        # 5x standard limit — ClickHouse query fan-out requires many TCP connections
        maxConnections: 5000
        connectTimeout: 10s
        tcpKeepalive:
          time: 7200s
          interval: 75s
          probes: 10
      http:
        # 5x standard — concurrent BI dashboard queries from multiple tenants
        http1MaxPendingRequests: 5000
        http2MaxRequests: 50000
        maxRequestsPerConnection: 5000
        maxRetries: 5
        idleTimeout: 120s
        h2UpgradePolicy: UPGRADE
    outlierDetection:
      consecutive5xxErrors: 5
      consecutiveGatewayErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 30
      splitExternalLocalOriginErrors: true
    tls:
      mode: ISTIO_MUTUAL
  subsets:
    - name: stable
      labels:
        version: stable
      trafficPolicy:
        loadBalancer:
          simple: LEAST_CONN
        tls:
          mode: ISTIO_MUTUAL
    - name: canary
      labels:
        version: canary
      trafficPolicy:
        loadBalancer:
          simple: LEAST_CONN
        tls:
          mode: ISTIO_MUTUAL

---
# =============================================================================
# LOGISTICOS-AI NAMESPACE
