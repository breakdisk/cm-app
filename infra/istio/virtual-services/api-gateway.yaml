    # =========================================================================
    # Payments & Billing — /v1/payments/*
    # COD reconciliation, invoicing, payment gateway integrations.
    # NOTE: POST /v1/payments/* must carry X-Idempotency-Key.
    # Retry only on network/gateway errors — never on 5xx for payment POSTs
    # to prevent double-charges. PCI-DSS scope: payment data stays in
    # logisticos-data namespace and never transits other services.
    # =========================================================================
    - name: payments-route
      match:
        - uri:
            prefix: "/v1/payments/"
      corsPolicy:
        allowOrigins:
          - exact: "https://merchant.logisticos.io"
          - exact: "https://admin.logisticos.io"
          - exact: "https://partner.logisticos.io"
          - exact: "https://track.logisticos.io"
        allowMethods:
          - GET
          - POST
          - PUT
          - OPTIONS
        allowHeaders:
          - Authorization
          - Content-Type
          - Accept
          - X-Request-ID
          - X-Tenant-ID
          - X-API-Key
          - X-Idempotency-Key
          - X-Canary
          - Traceparent
          - Tracestate
        exposeHeaders:
          - X-Request-ID
          - X-RateLimit-Limit
          - X-RateLimit-Remaining
          - X-RateLimit-Reset
        allowCredentials: true
        maxAge: "86400s"
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 5s
        # gateway-error,connect-failure only — do NOT retry 5xx for payment mutations
        retryOn: "gateway-error,connect-failure"
        retryRemoteLocalities: true
      route:
        - destination:
            host: payments.logisticos-data.svc.cluster.local
            port:
              number: 8012
          weight: 100
      headers:
        request:
          add:
            x-forwarded-service: "api-gateway"
          remove:
            - x-internal-only

    # =========================================================================
    # Analytics & BI — /v1/analytics/*
    # ClickHouse-backed reporting, delivery KPIs, zone demand forecasts.
    # Timeout extended to 30s; complex BI queries may approach this limit.
    # =========================================================================
    - name: analytics-route
      match:
        - uri:
            prefix: "/v1/analytics/"
      corsPolicy:
        allowOrigins:
          - exact: "https://merchant.logisticos.io"
          - exact: "https://admin.logisticos.io"
          - exact: "https://partner.logisticos.io"
          - exact: "https://track.logisticos.io"
