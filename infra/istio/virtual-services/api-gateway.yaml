    # =========================================================================
    - name: pod-route
      match:
        - uri:
            prefix: "/v1/pod/"
      corsPolicy:
        allowOrigins:
          - exact: "https://merchant.logisticos.io"
          - exact: "https://admin.logisticos.io"
          - exact: "https://partner.logisticos.io"
          - exact: "https://track.logisticos.io"
        allowMethods:
