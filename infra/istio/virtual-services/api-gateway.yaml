    # Notification dispatch, channel management (WhatsApp, SMS, Email, Push).
    # =========================================================================
    - name: engagement-route
      match:
        - uri:
            prefix: "/v1/engagement/"
      corsPolicy:
        allowOrigins:
          - exact: "https://merchant.logisticos.io"
          - exact: "https://admin.logisticos.io"
          - exact: "https://partner.logisticos.io"
          - exact: "https://track.logisticos.io"
        allowMethods:
