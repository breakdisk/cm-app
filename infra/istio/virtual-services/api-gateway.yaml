          - exact: "https://track.logisticos.io"
        allowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - OPTIONS
        allowHeaders:
          - Authorization
          - Content-Type
          - Accept
          - X-Request-ID
          - X-Tenant-ID
          - X-API-Key
          - X-Canary
          - Traceparent
          - Tracestate
        exposeHeaders:
          - X-Request-ID
          - X-RateLimit-Limit
          - X-RateLimit-Remaining
          - X-RateLimit-Reset
        allowCredentials: true
        maxAge: "86400s"
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: "gateway-error,connect-failure,retriable-4xx"
        retryRemoteLocalities: true
      route:
        - destination:
            host: dispatch.logisticos-logistics.svc.cluster.local
            port:
              number: 8005
          weight: 100
      headers:
        request:
          add:
            x-forwarded-service: "api-gateway"
          remove:
            - x-internal-only

    # =========================================================================
    # Driver Operations — /v1/drivers/*
    # Driver task management, location updates, POD submission.
    # Live location updates target < 2s E2E (per engineering standards).
    # =========================================================================
    - name: driver-ops-route
      match:
