    # Customer profile unification, behavioral tracking, consent management.
    # =========================================================================
    - name: cdp-route
      match:
        - uri:
            prefix: "/v1/cdp/"
      corsPolicy:
        allowOrigins:
          - exact: "https://merchant.logisticos.io"
          - exact: "https://admin.logisticos.io"
          - exact: "https://partner.logisticos.io"
          - exact: "https://track.logisticos.io"
        allowMethods:
