            port:
              number: 8007
          weight: 100
      headers:
        request:
          add:
            x-forwarded-service: "api-gateway"
          remove:
            - x-internal-only

    # =========================================================================
    # Default catch-all — return 404 for unmatched paths
    # Prevents accidental exposure of unrouted paths.
    # =========================================================================
    - name: default-deny
      match:
        - uri:
            prefix: "/"
      directResponse:
        status: 404
        body:
          string: '{"error":"not_found","message":"The requested API path does not exist."}'
      headers:
        response:
          add:
            content-type: "application/json"
