# LogisticOS API Gateway VirtualService
#
# Routes all inbound traffic on api.logisticos.io to the appropriate backend
# microservice based on URI prefix. Each route applies:
#   - 30s timeout (accounts for AI-layer and analytics queries; tighter per-service
#     timeouts should be set in service-level VirtualServices for hot paths)
#   - Retry policy: 3 attempts, 5s per-try timeout, retries on gateway/network errors
#     and retriable 4xx (408, 429). Idempotent mutation endpoints (PUT, DELETE) are
#     safe to retry; POST routes to order-intake and payments carry
#     per-route retry disabled comments to flag for review.
#   - CORS: configured for the four portal origins; credentials allowed for
#     JWT cookie flows; preflight cached 24h.
#
# Ordering note: More specific prefixes are listed before broader ones within
# the same service group. Istio evaluates routes top-to-bottom and stops at
# the first match.

apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-gateway-vs
  namespace: logisticos-core
  labels:
    app: api-gateway
    component: virtual-service
    managed-by: istio
  annotations:
    logisticos.io/description: "Main API gateway routing — all external REST traffic"
    logisticos.io/owner: "platform-engineering"
spec:
  # Binds this VirtualService to the logisticos-gateway Gateway resource
  gateways:
    - logisticos-core/logisticos-gateway
    # Also allow mesh-internal calls on this hostname (e.g., from ai-layer)
    - mesh

  hosts:
    - "api.logisticos.io"

  http:
    # =========================================================================
    # CORS preflight catch-all — must be first so OPTIONS requests never
    # reach backends before authentication middleware runs.
    # =========================================================================
    - name: cors-preflight
      match:
        - method:
            exact: OPTIONS
      corsPolicy:
        allowOrigins:
          - exact: "https://merchant.logisticos.io"
          - exact: "https://admin.logisticos.io"
          - exact: "https://partner.logisticos.io"
          - exact: "https://track.logisticos.io"
        allowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
          - HEAD
        allowHeaders:
          - Authorization
          - Content-Type
          - Accept
          - X-Request-ID
          - X-Tenant-ID
          - X-API-Key
          - X-Canary
          - Traceparent
          - Tracestate
          - Baggage
        exposeHeaders:
          - X-Request-ID
          - X-RateLimit-Limit
          - X-RateLimit-Remaining
          - X-RateLimit-Reset
        allowCredentials: true
        maxAge: "86400s"
      route:
        # Return 204 directly from Envoy — no backend needed for preflight
        - destination:
            host: api-gateway.logisticos-core.svc.cluster.local
            port:
              number: 8000
          weight: 100

    # =========================================================================
    # Identity Service — /v1/identity/*
    # Auth, tenant management, RBAC, OAuth/OIDC endpoints.
    # POST /v1/identity/token is NOT retried (auth tokens are single-use).
    # =========================================================================
    - name: identity-route
      match:
        - uri:
            prefix: "/v1/identity/"
      corsPolicy:
        allowOrigins:
          - exact: "https://merchant.logisticos.io"
          - exact: "https://admin.logisticos.io"
          - exact: "https://partner.logisticos.io"
          - exact: "https://track.logisticos.io"
        allowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        allowHeaders:
          - Authorization
          - Content-Type
          - Accept
          - X-Request-ID
          - X-Tenant-ID
          - X-API-Key
          - X-Canary
          - Traceparent
          - Tracestate
        exposeHeaders:
          - X-Request-ID
          - X-RateLimit-Limit
          - X-RateLimit-Remaining
          - X-RateLimit-Reset
        allowCredentials: true
        maxAge: "86400s"
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: "gateway-error,connect-failure,retriable-4xx"
        retryRemoteLocalities: true
      route:
        - destination:
            host: identity.logisticos-core.svc.cluster.local
            port:
              number: 8001
          weight: 100
      headers:
        request:
          add:
            x-forwarded-service: "api-gateway"
          remove:
            - x-internal-only

    # =========================================================================
    # Order Intake — /v1/orders/*
    # Shipment creation, bulk upload, status queries.
    # NOTE: POST /v1/orders creates shipments — retry only on network errors,
    # not on 5xx, to prevent duplicate order creation. Idempotency key required
    # by the order-intake service (X-Idempotency-Key header).
    # =========================================================================
    - name: order-intake-route
      match:
        - uri:
            prefix: "/v1/orders/"
      corsPolicy:
        allowOrigins:
          - exact: "https://merchant.logisticos.io"
          - exact: "https://admin.logisticos.io"
          - exact: "https://partner.logisticos.io"
          - exact: "https://track.logisticos.io"
        allowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        allowHeaders:
          - Authorization
          - Content-Type
          - Accept
          - X-Request-ID
          - X-Tenant-ID
          - X-API-Key
          - X-Idempotency-Key
          - X-Canary
          - Traceparent
          - Tracestate
        exposeHeaders:
          - X-Request-ID
          - X-RateLimit-Limit
          - X-RateLimit-Remaining
          - X-RateLimit-Reset
        allowCredentials: true
        maxAge: "86400s"
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 5s
        # Excludes 5xx from retry on POST paths — idempotency key enforced upstream
        retryOn: "gateway-error,connect-failure,retriable-4xx"
        retryRemoteLocalities: true
      route:
        - destination:
            host: order-intake.logisticos-logistics.svc.cluster.local
            port:
              number: 8004
          weight: 100
      headers:
        request:
          add:
            x-forwarded-service: "api-gateway"
          remove:
            - x-internal-only

    # =========================================================================
    # Dispatch & Routing — /v1/dispatch/*
    # Driver assignment, route optimization, VRP queries.
    # P99 target: 500ms for dispatch assignment (per engineering standards).
