    # =========================================================================
    # AI Agents / Intelligence Layer — /v1/agents/*
    # LangGraph agent workflows, Claude API, MCP tool dispatch.
    # Longer timeout: agent planning loops can take several seconds.
    # All agent calls go through api-gateway (ai-layer accepts from core only).
    # =========================================================================
    - name: ai-layer-route
      match:
        - uri:
            prefix: "/v1/agents/"
      corsPolicy:
        allowOrigins:
          - exact: "https://merchant.logisticos.io"
          - exact: "https://admin.logisticos.io"
          - exact: "https://partner.logisticos.io"
          - exact: "https://track.logisticos.io"
        allowMethods:
          - GET
          - POST
          - OPTIONS
        allowHeaders:
          - Authorization
          - Content-Type
          - Accept
          - X-Request-ID
          - X-Tenant-ID
          - X-API-Key
          - X-Canary
          - X-Agent-Session-ID
          - Traceparent
          - Tracestate
        exposeHeaders:
          - X-Request-ID
          - X-RateLimit-Limit
          - X-RateLimit-Remaining
          - X-RateLimit-Reset
          - X-Agent-Session-ID
        allowCredentials: true
        maxAge: "86400s"
      # Agent planning loops may take up to 30s; POST to /stream use SSE (no timeout needed)
      timeout: 30s
      retries:
        # Agent requests are stateful; only retry on network failures
        attempts: 2
        perTryTimeout: 15s
        retryOn: "gateway-error,connect-failure"
        retryRemoteLocalities: true
      route:
        - destination:
