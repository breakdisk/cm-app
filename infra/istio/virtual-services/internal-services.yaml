# LogisticOS Internal Services VirtualServices — Canary Deployment Support
#
# One VirtualService per service. Each VS:
#   1. Splits traffic between `stable` and `canary` subsets (defined in destination-rules.yaml)
#   2. Default weights: stable=100, canary=0 (canary is dark by default)
#   3. Header-based canary override: x-canary: "true" routes 100% to canary subset,
#      enabling QA, integration testing, and progressive rollout without affecting
#      production traffic.
#
# Canary rollout procedure (example: rolling dispatch to 10% canary):
#   kubectl patch vs dispatch-vs -n logisticos-logistics --type=json \
#     -p='[{"op":"replace","path":"/spec/http/1/route/0/weight","value":90},
#          {"op":"replace","path":"/spec/http/1/route/1/weight","value":10}]'
#
# These VirtualServices operate on mesh-internal traffic only (no gateway binding).
# The api-gateway VS routes external traffic; these VSes apply to service-to-service calls.
#
# All 17 services are covered:
#   Core:       identity, business-logic, api-gateway (internal mesh face)
#   Logistics:  order-intake, dispatch, driver-ops, fleet, hub-ops, carrier, pod
#   Engagement: engagement, cdp, marketing
#   Data:       delivery-experience, payments, analytics
#   AI:         ai-layer

---
# =============================================================================
# LOGISTICOS-CORE NAMESPACE
# =============================================================================

apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: identity-vs
  namespace: logisticos-core
  labels:
    app: identity
    component: virtual-service
    managed-by: istio
  annotations:
    logisticos.io/description: "Canary-capable VS for identity service"
    logisticos.io/canary-procedure: "Patch route index 1 weights to shift stable/canary split"
spec:
  hosts:
    - identity.logisticos-core.svc.cluster.local
  http:
    # Rule 1: Header-based canary override — 100% to canary for marked requests
    - name: identity-canary-header
      match:
        - headers:
            x-canary:
              exact: "true"
      route:
        - destination:
            host: identity.logisticos-core.svc.cluster.local
            subset: canary
            port:
              number: 8001
          weight: 100
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: "gateway-error,connect-failure,retriable-4xx"

    # Rule 2: Weight-based split — default stable=100, canary=0
    - name: identity-weight-split
      route:
        - destination:
            host: identity.logisticos-core.svc.cluster.local
            subset: stable
            port:
              number: 8001
          weight: 100
        - destination:
            host: identity.logisticos-core.svc.cluster.local
            subset: canary
            port:
              number: 8001
          weight: 0
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: "gateway-error,connect-failure,retriable-4xx"

