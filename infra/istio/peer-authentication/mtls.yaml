---
# -----------------------------------------------------------------------------
# analytics
# Accepts from: ALL logisticos-* namespaces (every service emits metrics/events)
#               + logisticos-infra (Prometheus scrapes /metrics from analytics pods)
# This is the broadest AuthorizationPolicy in the platform; it is intentional —
# analytics is a read-heavy observability target for all services.
# -----------------------------------------------------------------------------
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: analytics-authz
  namespace: logisticos-data
  labels:
    app: analytics
    component: authorization-policy
    managed-by: istio
  annotations:
    logisticos.io/description: >
      Analytics accepts from all application namespaces and infra (Prometheus).
      Intentionally broad — analytics is the platform-wide BI and observability sink.
spec:
  selector:
    matchLabels:
      app: analytics
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - logisticos-core
              - logisticos-logistics
              - logisticos-engagement
              - logisticos-ai
              - logisticos-data
              # logisticos-infra: Prometheus, Grafana, and Loki scrape analytics metrics
              - logisticos-infra
      to:
        - operation:
            methods:
              - GET
              - POST
              - OPTIONS

---
# -----------------------------------------------------------------------------
# ai-layer
# Accepts from: logisticos-core ONLY.
# All agent invocations are routed through api-gateway (logisticos-core).
# Direct service-to-ai-layer calls from logistics/engagement are prohibited —
# this enforces the MCP gateway pattern defined in ADR-0004.
# -----------------------------------------------------------------------------
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: ai-layer-authz
  namespace: logisticos-ai
  labels:
    app: ai-layer
    component: authorization-policy
    managed-by: istio
  annotations:
    logisticos.io/description: >
      ai-layer accepts ONLY from logisticos-core. Enforces ADR-0004: all agent
      invocations go through api-gateway; no direct service-to-agent calls.
spec:
  selector:
    matchLabels:
      app: ai-layer
  action: ALLOW
  rules:
    - from:
        - source:
            # Exclusively logisticos-core — api-gateway is the sole caller
            namespaces:
              - logisticos-core
      to:
        - operation:
            methods:
              - GET
              - POST
              - OPTIONS
