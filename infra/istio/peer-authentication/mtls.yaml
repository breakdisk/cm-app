# LogisticOS Istio mTLS and Authorization Policy Configuration
#
# This file contains:
#   1. Mesh-wide default PeerAuthentication (PERMISSIVE) — allows gradual mTLS migration
#   2. Per-namespace STRICT PeerAuthentication for all application namespaces
#   3. PERMISSIVE PeerAuthentication for logisticos-infra (Postgres/Redis/Kafka cannot
#      present mTLS certificates; they run outside the sidecar mesh)
#   4. AuthorizationPolicy for each service, restricting allowed source namespaces
#      to the minimum required set (least-privilege principle).
#
# Namespace mTLS summary:
#   logisticos-core        → STRICT
#   logisticos-logistics   → STRICT
#   logisticos-engagement  → STRICT
#   logisticos-ai          → STRICT
#   logisticos-data        → STRICT
#   logisticos-infra       → PERMISSIVE (data infrastructure — no sidecars on Postgres/Redis/Kafka)
#   mesh-wide default      → PERMISSIVE (safe fallback during migration; tighten after full sidecar rollout)
#
# AuthorizationPolicy communication matrix:
#
#   api-gateway        ← istio-system (ingress gateway), logisticos-ai
#   identity           ← logisticos-core, logisticos-logistics, logisticos-engagement,
#                        logisticos-ai, logisticos-data
#   dispatch           ← logisticos-core, logisticos-ai
#   order-intake       ← logisticos-core, logisticos-logistics, logisticos-ai
#   driver-ops         ← logisticos-core, logisticos-logistics, logisticos-ai
#   fleet              ← logisticos-core, logisticos-logistics, logisticos-ai
#   hub-ops            ← logisticos-core, logisticos-logistics, logisticos-ai
#   carrier            ← logisticos-core, logisticos-logistics, logisticos-ai
#   pod                ← logisticos-core, logisticos-logistics, logisticos-ai
#   engagement         ← logisticos-core, logisticos-logistics, logisticos-engagement, logisticos-ai
#   cdp                ← logisticos-core, logisticos-engagement, logisticos-ai
#   marketing          ← logisticos-core, logisticos-engagement, logisticos-ai
#   delivery-experience← logisticos-core, logisticos-logistics, logisticos-data
#   payments           ← logisticos-core, logisticos-logistics, logisticos-data
#   analytics          ← all logisticos-* namespaces + logisticos-infra (Prometheus scrape)
#   ai-layer           ← logisticos-core ONLY (all agent invocations via api-gateway)
#   business-logic     ← logisticos-core, logisticos-logistics, logisticos-engagement, logisticos-ai

# =============================================================================
# 1. MESH-WIDE DEFAULT: PERMISSIVE
#    Installed in istio-system. Allows services without sidecars (e.g., during
#    initial rollout) to still communicate. Override per-namespace below.
# =============================================================================

apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: mesh-default-permissive
  namespace: istio-system
  labels:
    managed-by: istio
  annotations:
    logisticos.io/description: >
      Mesh-wide default: PERMISSIVE. Accepts both mTLS and plaintext.
      Namespace-level STRICT policies take precedence for enrolled namespaces.
      Tighten to STRICT mesh-wide once all workloads have confirmed sidecar injection.
spec:
  mtls:
    mode: PERMISSIVE

---
# =============================================================================
# 2. PER-NAMESPACE STRICT mTLS — APPLICATION NAMESPACES
#    Any pod in these namespaces without a valid SPIFFE certificate will be
#    rejected. Ensures no plaintext service-to-service communication.
# =============================================================================

apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: logisticos-core
  labels:
    managed-by: istio
  annotations:
    logisticos.io/description: "Strict mTLS for logisticos-core namespace"
spec:
  mtls:
    mode: STRICT

---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: logisticos-logistics
  labels:
    managed-by: istio
  annotations:
    logisticos.io/description: "Strict mTLS for logisticos-logistics namespace"
spec:
  mtls:
    mode: STRICT

---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: logisticos-engagement
  labels:
    managed-by: istio
  annotations:
    logisticos.io/description: "Strict mTLS for logisticos-engagement namespace"
spec:
  mtls:
    mode: STRICT

---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: logisticos-ai
  labels:
    managed-by: istio
  annotations:
    logisticos.io/description: "Strict mTLS for logisticos-ai namespace"
spec:
  mtls:
    mode: STRICT

---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: logisticos-data
  labels:
    managed-by: istio
  annotations:
    logisticos.io/description: "Strict mTLS for logisticos-data namespace"
spec:
  mtls:
    mode: STRICT

---
# =============================================================================
# 3. PERMISSIVE mTLS — INFRASTRUCTURE NAMESPACE
#    PostgreSQL, Redis, and Kafka pods run without Istio sidecars; they cannot
#    present mTLS certificates. PERMISSIVE allows application sidecars to initiate
#    plaintext connections to these data stores on their cluster-internal IPs.
#    The logisticos-infra namespace is not exposed externally.
# =============================================================================

apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: infra-permissive-mtls
  namespace: logisticos-infra
  labels:
    managed-by: istio
  annotations:
    logisticos.io/description: >
      PERMISSIVE for logisticos-infra. Postgres, Redis, and Kafka do not support
      mTLS. Application services connect to these with TLS-at-rest (Postgres SSL,
      Redis TLS, Kafka TLS) but these are not managed by Istio.
spec:
  mtls:
    mode: PERMISSIVE

---
# =============================================================================
# 4. AUTHORIZATION POLICIES
#    Each policy uses `from.source.namespaces` to restrict which namespaces
#    may call each service. Combined with STRICT mTLS, this enforces SPIFFE
#    identity at the namespace level (namespace = service account SPIFFE URI prefix).
#
#    Note: istio-system is included for services reachable from the ingress gateway.
#    The `principals` approach (SPIFFE SVIDs) is the correct enforcement mechanism
#    when you need service-account-level granularity; namespace-level is sufficient
#    for this platform's security posture.
# =============================================================================

# -----------------------------------------------------------------------------
# api-gateway
# Accepts from: istio-system (Envoy ingress), logisticos-ai (agent callbacks)
# -----------------------------------------------------------------------------
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: api-gateway-authz
  namespace: logisticos-core
  labels:
    app: api-gateway
    component: authorization-policy
    managed-by: istio
  annotations:
    logisticos.io/description: "Restrict api-gateway inbound to ingress and ai-layer"
spec:
  selector:
    matchLabels:
      app: api-gateway
  action: ALLOW
  rules:
    - from:
        - source:
            # Istio ingress gateway (external traffic post-TLS termination)
            namespaces:
              - istio-system
        - source:
            # ai-layer calls api-gateway for MCP tool dispatch coordination
            namespaces:
              - logisticos-ai
      to:
        - operation:
            methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
              - HEAD

---
# -----------------------------------------------------------------------------
# identity
# Accepts from: all application namespaces — every service may need to verify
# tokens or fetch RBAC policy during request processing.
# -----------------------------------------------------------------------------
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: identity-authz
  namespace: logisticos-core
  labels:
    app: identity
    component: authorization-policy
    managed-by: istio
  annotations:
    logisticos.io/description: "Restrict identity inbound to all application namespaces"
spec:
  selector:
    matchLabels:
      app: identity
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - istio-system
              - logisticos-core
              - logisticos-logistics
              - logisticos-engagement
              - logisticos-ai
              - logisticos-data
      to:
        - operation:
            methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS

---
