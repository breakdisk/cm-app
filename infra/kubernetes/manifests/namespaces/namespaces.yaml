---
# ─────────────────────────────────────────────────────────────────────────────
# Infrastructure Services
# Hosts: postgres, redis, kafka, clickhouse, monitoring stack
# Istio injection disabled for stateful infrastructure workloads —
# these components are managed by their respective Helm operators and
# communicate over cluster-internal service DNS only.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: logisticos-infra
  labels:
    tier: infra
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
    # Istio injection disabled: stateful operators manage their own
    # mTLS bootstrapping and sidecar injection causes issues with
    # Kafka's advertised listeners and PostgreSQL streaming replication.
    istio-injection: disabled
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: baseline
  annotations:
    environment: production
    managed-by: terraform
    owner: platform-team
    description: "Infrastructure: postgres, redis, kafka, clickhouse, prometheus, grafana, loki"
    logisticos.io/tier: infra
    logisticos.io/contact: platform-infra@logisticos.io
    # Privileged pod security policy is required for:
    # - PostgreSQL with huge pages
    # - Kafka with privileged network settings
    # - ClickHouse with elevated ulimits
    # Security review: SR-2025-0011
    logisticos.io/security-exception: "SR-2025-0011"
