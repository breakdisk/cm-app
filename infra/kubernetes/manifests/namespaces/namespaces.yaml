---
# ─────────────────────────────────────────────────────────────────────────────
# LogisticOS Kubernetes Namespaces
#
# All platform namespaces are defined here. Each namespace maps to a functional
# tier of the platform. Istio sidecar injection is enabled globally via the
# mesh config; per-namespace opt-out is handled by annotation override.
#
# Managed by: Terraform (infra/terraform/modules/k8s-namespaces)
# Do NOT edit this file manually in production. Changes must go through the
# Terraform plan → apply workflow.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# Core Platform Services
# Hosts: identity, api-gateway, business-logic
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: logisticos-core
  labels:
    tier: core
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
    istio-injection: enabled
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
  annotations:
    environment: production
    managed-by: terraform
    owner: platform-team
    description: "Core platform services: identity, api-gateway, business-logic"
    logisticos.io/tier: core
    logisticos.io/contact: platform-team@logisticos.io

