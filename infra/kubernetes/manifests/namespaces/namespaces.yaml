---
# ─────────────────────────────────────────────────────────────────────────────
# AI Intelligence Layer
# Hosts: ai-layer (Python sidecar + ONNX serving + MCP runtime)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: logisticos-ai
  labels:
    tier: ai
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
    istio-injection: enabled
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
  annotations:
    environment: production
    managed-by: terraform
    owner: platform-team
    description: "AI intelligence layer: dispatch-agent, support-agent, marketing-agent, MCP runtime"
    logisticos.io/tier: ai
    logisticos.io/contact: ai-ml-team@logisticos.io
    # Baseline policy applied (not restricted) because ONNX model containers
    # may require elevated tmpfs for model caching. Reviewed and accepted:
    # ADR-0004, security review SR-2025-0042.
    logisticos.io/security-exception: "SR-2025-0042"

