---
# ─────────────────────────────────────────────────────────────────────────────
# RoleBindings — logisticos-ai namespace
# The AI layer SA gets service-reader, secret-reader, AND configmap-reader
# because it needs to enumerate MCP server endpoints and load model configs.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: logisticos-ai-sa:service-reader
  namespace: logisticos-ai
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
subjects:
  - kind: ServiceAccount
    name: logisticos-ai-sa
    namespace: logisticos-ai
roleRef:
  kind: ClusterRole
  name: logisticos:service-reader
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: logisticos-ai-sa:secret-reader
  namespace: logisticos-ai
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
subjects:
  - kind: ServiceAccount
    name: logisticos-ai-sa
    namespace: logisticos-ai
roleRef:
  kind: ClusterRole
  name: logisticos:secret-reader
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRoleBinding — AI layer SA gets configmap-reader cluster-wide
# so it can discover MCP tool endpoints registered across all namespaces
# by enterprise tenant MCP extensions (see ADR-0004).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: logisticos-ai-sa:configmap-reader
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "AI layer requires cluster-wide ConfigMap read for MCP tool registry discovery across tenant-registered extension namespaces. See ADR-0004."
subjects:
  - kind: ServiceAccount
    name: logisticos-ai-sa
    namespace: logisticos-ai
roleRef:
  kind: ClusterRole
  name: logisticos:configmap-reader
  apiGroup: rbac.authorization.k8s.io
