---
# ─────────────────────────────────────────────────────────────────────────────
# LogisticOS Kubernetes RBAC — Service Accounts, Cluster Roles & Bindings
#
# Each namespace group has a dedicated ServiceAccount. Workloads reference
# their namespace SA via `spec.serviceAccountName`. IRSA / Workload Identity
# annotations are applied by the Terraform module post-apply.
#
# Managed by: Terraform (infra/terraform/modules/k8s-rbac)
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# IMAGE PULL SECRET REFERENCES
# All SAs reference the GHCR pull secret provisioned by the platform team.
# The secret `ghcr-pull-secret` is created by the bootstrap Helm chart and
# exists in every namespace listed below.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: logisticos-core-sa
  namespace: logisticos-core
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
    logisticos.io/tier: core
  annotations:
    description: "Service account for core platform workloads (identity, api-gateway, business-logic)"
    # AWS IRSA annotation — set by Terraform based on cluster environment.
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/logisticos-core-sa
imagePullSecrets:
  - name: ghcr-pull-secret

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: logisticos-logistics-sa
  namespace: logisticos-logistics
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
    logisticos.io/tier: logistics
  annotations:
    description: "Service account for logistics domain workloads (order-intake, dispatch, driver-ops, fleet, hub-ops, carrier, pod)"
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/logisticos-logistics-sa
imagePullSecrets:
  - name: ghcr-pull-secret

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: logisticos-engagement-sa
  namespace: logisticos-engagement
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
    logisticos.io/tier: engagement
  annotations:
    description: "Service account for engagement workloads (engagement-engine, cdp, marketing-automation)"
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/logisticos-engagement-sa
imagePullSecrets:
  - name: ghcr-pull-secret

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: logisticos-ai-sa
  namespace: logisticos-ai
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
    logisticos.io/tier: ai
  annotations:
    description: "Service account for AI intelligence layer workloads. Requires broader read permissions for MCP tool dispatch."
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/logisticos-ai-sa
imagePullSecrets:
  - name: ghcr-pull-secret

---
# ─────────────────────────────────────────────────────────────────────────────
# ClusterRole: logisticos:service-reader
# Grants read access to services, endpoints, and pods cluster-wide.
# Used by all service accounts for internal service discovery via the
# Kubernetes API (e.g., Envoy EDS, Istio xDS, health checkers).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: logisticos:service-reader
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Read access to services, endpoints, and pods. Required for service discovery and health probing."
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]

---
# ─────────────────────────────────────────────────────────────────────────────
# ClusterRole: logisticos:secret-reader
# Grants get/list access to secrets. Used by Vault Agent Injector sidecars
# to authenticate via the Kubernetes auth method and retrieve injected secrets.
# Scoped tightly — no watch to limit audit log noise.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: logisticos:secret-reader
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Get/list secrets for Vault Agent sidecar authentication. No watch verb to reduce audit noise."
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["serviceaccounts", "serviceaccounts/token"]
    verbs: ["get", "create"]

---
# ─────────────────────────────────────────────────────────────────────────────
# ClusterRole: logisticos:configmap-reader
# Grants read access to ConfigMaps. Used by the AI layer for dynamic
# MCP tool registry and model configuration hot-reload.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: logisticos:configmap-reader
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Read access to ConfigMaps for dynamic MCP tool registry and model config hot-reload."
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

---
# ─────────────────────────────────────────────────────────────────────────────
# RoleBindings — logisticos-core namespace
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
