metadata:
  name: logisticos-core-sa:service-reader
  namespace: logisticos-core
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
subjects:
  - kind: ServiceAccount
    name: logisticos-core-sa
    namespace: logisticos-core
roleRef:
  kind: ClusterRole
  name: logisticos:service-reader
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
