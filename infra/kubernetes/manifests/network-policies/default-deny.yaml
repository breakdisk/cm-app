    - Egress

---
# ─────────────────────────────────────────────────────────────────────────────
# 2. ALLOW: API Gateway (logisticos-core) → logisticos-logistics
# The API Gateway is the single ingress point for external traffic.
# All inter-service calls into the logistics domain must pass through it.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-core-gateway
  namespace: logisticos-logistics
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow ingress from logisticos-core (api-gateway) into logistics services on HTTP(8080) and gRPC(9090)."
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-core
      ports:
        - protocol: TCP
          port: 8080   # HTTP / REST
        - protocol: TCP
          port: 9090   # gRPC

---
# ALLOW: API Gateway (logisticos-core) → logisticos-engagement
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-core-gateway
  namespace: logisticos-engagement
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow ingress from logisticos-core (api-gateway) into engagement services."
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-core
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090

---
# ALLOW: API Gateway (logisticos-core) → logisticos-data
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-core-gateway
  namespace: logisticos-data
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow ingress from logisticos-core (api-gateway) into data services."
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-core
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090

---
# ALLOW: Intra-core traffic (identity ↔ api-gateway ↔ business-logic)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-core
  namespace: logisticos-core
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow internal service-to-service traffic within logisticos-core namespace."
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-core
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-core

---
# ─────────────────────────────────────────────────────────────────────────────
# 3. ALLOW: Intra-logistics namespace traffic
# dispatch ↔ driver-ops, order-intake → dispatch, hub-ops → carrier, etc.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-logistics
  namespace: logisticos-logistics
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow all pod-to-pod traffic within logisticos-logistics for intra-domain gRPC calls."
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-logistics
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-logistics

---
# ─────────────────────────────────────────────────────────────────────────────
# 4. ALLOW: Engagement → Logistics
# The engagement engine calls dispatch (driver confirmation) and order-intake
# (delivery status for notification triggers) via gRPC.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-engagement-to-logistics
  namespace: logisticos-logistics
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow engagement namespace to call logistics services for notification trigger resolution."
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-engagement
      ports:
        - protocol: TCP
          port: 9090   # gRPC only — engagement has no need for REST endpoints

---
# Corresponding egress allow on engagement side to reach logistics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-logistics
  namespace: logisticos-engagement
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow engagement services to egress to logisticos-logistics namespace."
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-logistics
      ports:
        - protocol: TCP
          port: 9090

---
# ─────────────────────────────────────────────────────────────────────────────
# 5. ALLOW: AI layer → all service namespaces (MCP tool calls)
# The AI intelligence layer dispatches MCP tool calls to every service.
# This is the agentic runtime's cross-namespace access grant.
# Per ADR-0004: all agent actions are mediated by MCP — no direct DB access.
# ─────────────────────────────────────────────────────────────────────────────

# AI → logistics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ai-ingress
  namespace: logisticos-logistics
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow AI layer to call logistics MCP tool endpoints."
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-ai
      ports:
        - protocol: TCP
          port: 8080   # MCP HTTP endpoint
        - protocol: TCP
          port: 9090   # MCP over gRPC

---
# AI → engagement
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ai-ingress
  namespace: logisticos-engagement
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow AI layer to call engagement MCP tool endpoints."
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-ai
