        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090

---
# AI → core
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ai-ingress
  namespace: logisticos-core
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow AI layer to call core services (identity validation, business-logic rules engine)."
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-ai
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090

---
# AI egress allow — must explicitly permit outbound to all service namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ai-egress-to-services
  namespace: logisticos-ai
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow AI layer egress to all LogisticOS service namespaces for MCP tool dispatch."
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - logisticos-core
                  - logisticos-logistics
                  - logisticos-engagement
                  - logisticos-data
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
    # Allow AI egress to internet for Anthropic Claude API and OpenAI
    - ports:
        - protocol: TCP
          port: 443

---
# ─────────────────────────────────────────────────────────────────────────────
# 6. ALLOW: All service namespaces → logisticos-infra
# Every service needs access to PostgreSQL, Redis, Kafka, ClickHouse.
# Specific ports are explicitly listed to prevent any service from reaching
# infrastructure management ports (e.g., Kafka JMX, PG admin).
# ─────────────────────────────────────────────────────────────────────────────

# Core → infra
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-infra
  namespace: logisticos-core
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow core services egress to infrastructure (postgres:5432, redis:6379, kafka:9092)."
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-infra
      ports:
        - protocol: TCP
          port: 5432   # PostgreSQL
        - protocol: TCP
          port: 6379   # Redis
        - protocol: TCP
          port: 9092   # Kafka (plaintext, cluster-internal)
        - protocol: TCP
          port: 9093   # Kafka (TLS)

---
# Logistics → infra
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-infra
  namespace: logisticos-logistics
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow logistics services egress to infrastructure."
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-infra
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093

---
# Engagement → infra
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-infra
  namespace: logisticos-engagement
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow engagement services egress to infrastructure."
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-infra
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093

---
# AI → infra
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-infra
  namespace: logisticos-ai
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow AI layer egress to infrastructure (Kafka for event streaming, Redis for agent state)."
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-infra
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093

---
# Data → infra (includes ClickHouse and TimescaleDB)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-infra
  namespace: logisticos-data
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow data services egress to infrastructure including ClickHouse and TimescaleDB."
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-infra
      ports:
        - protocol: TCP
          port: 5432   # PostgreSQL / TimescaleDB
        - protocol: TCP
          port: 6379   # Redis
        - protocol: TCP
          port: 9092   # Kafka
        - protocol: TCP
          port: 9093   # Kafka TLS
        - protocol: TCP
          port: 9000   # ClickHouse HTTP
        - protocol: TCP
          port: 9440   # ClickHouse HTTPS
        - protocol: TCP
          port: 9004   # ClickHouse MySQL compat port (BI tools)

---
# ─────────────────────────────────────────────────────────────────────────────
# 7. ALLOW: Prometheus scraping (port 9090) from logisticos-infra → all namespaces
# Prometheus is deployed in logisticos-infra and scrapes /metrics endpoints
# on all service pods. Port 9091 is the Prometheus push gateway.
# ─────────────────────────────────────────────────────────────────────────────

# Allow Prometheus scrape ingress into logisticos-core
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: logisticos-core
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow Prometheus (logisticos-infra) to scrape /metrics endpoints in logisticos-core."
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-infra
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9090   # Standard Prometheus metrics port

