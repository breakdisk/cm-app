---
# ─────────────────────────────────────────────────────────────────────────────
# LogisticOS Kubernetes NetworkPolicies
#
# Security model: default-deny-all, then explicit allow.
# Policies are applied per-namespace. Istio mTLS handles encryption and
# service-level auth; NetworkPolicies handle IP-layer traffic control.
#
# Reading order:
#   1. Default deny-all per namespace (this file, first section)
#   2. Allow inbound from API gateway (core → all service namespaces)
#   3. Allow intra-logistics namespace traffic (service mesh calls)
#   4. Allow engagement → logistics (notification trigger calls)
#   5. Allow ai-layer → all namespaces (MCP tool calls)
#   6. Allow all service namespaces → infra (DB, cache, broker)
#   7. Allow Prometheus scraping from infra namespace
#
# Managed by: Terraform (infra/terraform/modules/k8s-network-policies)
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# 1. DEFAULT DENY — logisticos-core
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: logisticos-core
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
    logisticos.io/policy-type: default-deny
  annotations:
    description: "Deny all ingress and egress for logisticos-core. Explicit allow policies override."
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# ─────────────────────────────────────────────────────────────────────────────
# 1. DEFAULT DENY — logisticos-logistics
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
