---
# ─────────────────────────────────────────────────────────────────────────────
# 1. DEFAULT DENY — logisticos-data
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
