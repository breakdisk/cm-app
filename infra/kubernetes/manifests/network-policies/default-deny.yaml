        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090

---
# AI → data
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ai-ingress
  namespace: logisticos-data
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Allow AI layer to call data services MCP tool endpoints (analytics forecasts, payment status)."
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logisticos-ai
