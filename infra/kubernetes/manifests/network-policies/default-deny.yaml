    app.kubernetes.io/managed-by: terraform
    logisticos.io/policy-type: default-deny
  annotations:
    description: "Deny all ingress and egress for logisticos-logistics."
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# ─────────────────────────────────────────────────────────────────────────────
# 1. DEFAULT DENY — logisticos-engagement
# ─────────────────────────────────────────────────────────────────────────────
