---
# ─────────────────────────────────────────────────────────────────────────────
# ExternalSecret: kafka-credentials
# Kafka SASL/SCRAM credentials for all service namespaces.
# Vault path: secret/data/logisticos/kafka
# Refresh: 1h
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kafka-credentials
  namespace: logisticos-core
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
    logisticos.io/secret-type: broker
  annotations:
    description: "Kafka SASL credentials for core namespace."
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: logisticos-vault
    kind: ClusterSecretStore
  target:
    name: kafka-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        KAFKA_BROKERS: "{{ .brokers }}"
        KAFKA_SASL_USERNAME: "{{ .username }}"
        KAFKA_SASL_PASSWORD: "{{ .password }}"
        KAFKA_SASL_MECHANISM: "SCRAM-SHA-512"
        KAFKA_SECURITY_PROTOCOL: "SASL_SSL"
  data:
    - secretKey: brokers
      remoteRef:
        key: secret/logisticos/kafka
        property: brokers
    - secretKey: username
      remoteRef:
        key: secret/logisticos/kafka
        property: username
    - secretKey: password
      remoteRef:
        key: secret/logisticos/kafka
        property: password

