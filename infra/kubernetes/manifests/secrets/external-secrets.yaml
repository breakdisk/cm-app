---
# ─────────────────────────────────────────────────────────────────────────────
# LogisticOS External Secrets
#
# Uses the External Secrets Operator (ESO) with HashiCorp Vault as the secret
# backend. ESO watches these ExternalSecret resources and reconciles the
# referenced Vault paths into native Kubernetes Secrets on the configured
# refresh interval.
#
# Prerequisites:
#   - External Secrets Operator >= 0.9.0 installed in cluster
#   - HashiCorp Vault >= 1.15.0 reachable at vault.vault.svc.cluster.local:8200
#   - Vault Kubernetes auth method enabled and configured for cluster SA tokens
#   - Vault policy `logisticos-services` grants read on all paths below
#
# Secret rotation:
#   - Database credentials: 1h refresh (Vault dynamic secrets with 2h TTL)
#   - API keys (Stripe, Anthropic): 24h refresh (static secrets, rotated quarterly)
#   - JWT signing key: 12h refresh (rotated via automated key rotation job)
#
# Managed by: Terraform (infra/terraform/modules/external-secrets)
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# SecretStore: logisticos-vault
# A cluster-scoped store used by all namespaces.
# Uses Kubernetes ServiceAccount token auth against Vault's k8s auth backend.
# The `logisticos-services` Vault role has a bound_service_account_names of
# "*" within the logisticos-* namespaces with a token TTL of 1h.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: logisticos-vault
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
  annotations:
    description: "Cluster-scoped Vault SecretStore. All LogisticOS ExternalSecrets reference this store."
spec:
  provider:
    vault:
      server: "https://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      # CA bundle for mTLS validation of the Vault server certificate.
      # The cert is mounted from the vault-ca ConfigMap in the vault namespace.
      caProvider:
        type: ConfigMap
        name: vault-ca-bundle
        namespace: vault
        key: ca.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "logisticos-services"
          # Use the ESO controller's own ServiceAccount token for auth.
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets

---
# ─────────────────────────────────────────────────────────────────────────────
# ExternalSecret: db-credentials
# Namespace: logisticos-core (used by identity and business-logic services)
# Vault path: secret/data/logisticos/postgres
# Refresh: 1h (aligns with Vault dynamic secret lease TTL)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: logisticos-core
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
    logisticos.io/secret-type: database
  annotations:
    description: "PostgreSQL credentials for core namespace services. Dynamic secret; refreshed every hour."
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: logisticos-vault
    kind: ClusterSecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: logisticos
          logisticos.io/secret-type: database
      data:
        # Rendered as a full DSN for SQLx DATABASE_URL
        DATABASE_URL: "postgres://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/logisticos_core?sslmode=require"
  data:
    - secretKey: username
      remoteRef:
        key: secret/logisticos/postgres
        property: username
    - secretKey: password
      remoteRef:
        key: secret/logisticos/postgres
        property: password
    - secretKey: host
      remoteRef:
        key: secret/logisticos/postgres
        property: host
    - secretKey: port
      remoteRef:
        key: secret/logisticos/postgres
        property: port

