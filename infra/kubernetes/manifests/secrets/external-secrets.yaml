# ─────────────────────────────────────────────────────────────────────────────
# ExternalSecret: anthropic-api-key
# Namespace: logisticos-ai
# Vault path: secret/data/logisticos/ai
# Refresh: 24h (static secret; rotate quarterly via scheduled job)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: anthropic-api-key
  namespace: logisticos-ai
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
    logisticos.io/secret-type: ai-provider
  annotations:
    description: "Anthropic Claude API key for the AI intelligence layer. Rotated quarterly."
    logisticos.io/rotation-schedule: "quarterly"
    logisticos.io/rotation-runbook: "docs/runbooks/rotate-anthropic-key.md"
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: logisticos-vault
    kind: ClusterSecretStore
  target:
    name: anthropic-api-key
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: logisticos
          logisticos.io/secret-type: ai-provider
      data:
        ANTHROPIC_API_KEY: "{{ .api_key }}"
        OPENAI_API_KEY: "{{ .openai_api_key }}"
  data:
    - secretKey: api_key
      remoteRef:
        key: secret/logisticos/ai
        property: anthropic_api_key
    - secretKey: openai_api_key
      remoteRef:
        key: secret/logisticos/ai
        property: openai_api_key

---
# ─────────────────────────────────────────────────────────────────────────────
# ExternalSecret: jwt-signing-key
# Namespace: logisticos-core
# Vault path: secret/data/logisticos/identity
# Refresh: 12h (automated key rotation job runs every 12h; old key grace period 2h)
# Contains both current and previous signing keys for zero-downtime rotation.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jwt-signing-key
  namespace: logisticos-core
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
    logisticos.io/secret-type: identity
  annotations:
    description: "JWT RS256 signing key pair for the Identity service. Previous key retained for 2h grace period during rotation."
    logisticos.io/rotation-schedule: "every-90-days"
    logisticos.io/rotation-runbook: "docs/runbooks/rotate-jwt-signing-key.md"
spec:
  refreshInterval: "12h"
  secretStoreRef:
    name: logisticos-vault
    kind: ClusterSecretStore
  target:
    name: jwt-signing-key
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: logisticos
          logisticos.io/secret-type: identity
      data:
        JWT_PRIVATE_KEY_PEM: "{{ .private_key_pem }}"
        JWT_PUBLIC_KEY_PEM: "{{ .public_key_pem }}"
        JWT_KEY_ID: "{{ .key_id }}"
        JWT_PREVIOUS_PUBLIC_KEY_PEM: "{{ .previous_public_key_pem }}"
        JWT_PREVIOUS_KEY_ID: "{{ .previous_key_id }}"
  data:
    - secretKey: private_key_pem
      remoteRef:
        key: secret/logisticos/identity
        property: jwt_private_key_pem
    - secretKey: public_key_pem
      remoteRef:
        key: secret/logisticos/identity
        property: jwt_public_key_pem
    - secretKey: key_id
      remoteRef:
        key: secret/logisticos/identity
        property: jwt_key_id
    - secretKey: previous_public_key_pem
      remoteRef:
        key: secret/logisticos/identity
        property: jwt_previous_public_key_pem
    - secretKey: previous_key_id
      remoteRef:
        key: secret/logisticos/identity
        property: jwt_previous_key_id

---
# ─────────────────────────────────────────────────────────────────────────────
# ExternalSecret: stripe-api-key
# Namespace: logisticos-data
# Vault path: secret/data/logisticos/payments
# Refresh: 24h (static secret; PCI-DSS rotation policy: every 90 days)
# Note: Only the payments service pod mounts this secret via projected volume.
# Other pods in logisticos-data do NOT have access (enforced by Vault policy).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stripe-api-key
  namespace: logisticos-data
  labels:
    app.kubernetes.io/part-of: logisticos
    app.kubernetes.io/managed-by: terraform
    logisticos.io/secret-type: payment-provider
    logisticos.io/compliance: pci-dss
  annotations:
    description: "Stripe secret API key for the Payments service. PCI-DSS scoped — only payments pods may mount this secret."
    logisticos.io/rotation-schedule: "every-90-days"
    logisticos.io/rotation-runbook: "docs/runbooks/rotate-stripe-key.md"
    logisticos.io/pci-dss-scope: "true"
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: logisticos-vault
    kind: ClusterSecretStore
  target:
    name: stripe-api-key
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: logisticos
          logisticos.io/secret-type: payment-provider
          logisticos.io/compliance: pci-dss
      data:
        STRIPE_SECRET_KEY: "{{ .secret_key }}"
        STRIPE_WEBHOOK_SECRET: "{{ .webhook_secret }}"
        STRIPE_PUBLISHABLE_KEY: "{{ .publishable_key }}"
        PAYMONGO_SECRET_KEY: "{{ .paymongo_secret_key }}"
        PAYMONGO_PUBLIC_KEY: "{{ .paymongo_public_key }}"
  data:
    - secretKey: secret_key
      remoteRef:
        key: secret/logisticos/payments
        property: stripe_secret_key
    - secretKey: webhook_secret
      remoteRef:
        key: secret/logisticos/payments
        property: stripe_webhook_secret
    - secretKey: publishable_key
      remoteRef:
        key: secret/logisticos/payments
        property: stripe_publishable_key
    - secretKey: paymongo_secret_key
      remoteRef:
        key: secret/logisticos/payments
        property: paymongo_secret_key
    - secretKey: paymongo_public_key
      remoteRef:
        key: secret/logisticos/payments
        property: paymongo_public_key
