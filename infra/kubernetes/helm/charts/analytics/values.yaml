# Helm values override for the Analytics & BI service.
# CPU 2000m and memory 1Gi limits reflect ClickHouse query fan-out:
# complex GROUP BY queries across billions of rows are CPU-intensive,
# and large result sets require significant heap before serialisation.
# Ref: services/analytics — Rust + ClickHouse

image:
  repository: ghcr.io/logisticos/analytics
  pullPolicy: IfNotPresent
  tag: ""

replicaCount: 2

service:
  type: ClusterIP
  port: 8013
  grpcPort: 9013

env:
  - name: SERVICE_NAME
    value: analytics
  - name: SERVICE_PORT
    value: "8013"
  - name: GRPC_PORT
    value: "9013"
  - name: LOG_LEVEL
    value: info
  - name: RUST_LOG
    value: "analytics=info,tower_http=info"
  # ClickHouse HTTP interface port.
  - name: CLICKHOUSE_HTTP_PORT
    value: "8123"
  # ClickHouse query timeout in seconds for ad-hoc queries.
  - name: CLICKHOUSE_QUERY_TIMEOUT_SECS
    value: "30"
  # Kafka topic for analytics event ingestion.
  - name: KAFKA_EVENTS_TOPIC
    value: analytics.events.v1
  # Event deduplication window in hours (ClickHouse ReplacingMergeTree).
  - name: DEDUP_WINDOW_HOURS
    value: "24"
  # Zone demand forecast cache TTL in seconds (15 minutes).
  - name: FORECAST_CACHE_TTL_SECS
    value: "900"
  # Maximum number of events per RecordEvent RPC call.
  - name: MAX_EVENTS_PER_BATCH
    value: "100"

resources:
  # Elevated limits for ClickHouse query fan-out and result materialisation.
  limits:
    cpu: 2000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

livenessProbe:
  httpGet:
    path: /health
    port: 8013
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8013
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

podAnnotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/role: "analytics"
  vault.hashicorp.com/agent-inject-secret-config: "secret/data/logisticos/analytics"
  vault.hashicorp.com/agent-inject-template-config: |
    {{- with secret "secret/data/logisticos/analytics" -}}
    export CLICKHOUSE_URL="{{ .Data.data.clickhouse_url }}"
    export CLICKHOUSE_USER="{{ .Data.data.clickhouse_user }}"
    export CLICKHOUSE_PASSWORD="{{ .Data.data.clickhouse_password }}"
    export KAFKA_BROKERS="{{ .Data.data.kafka_brokers }}"
    export REDIS_URL="{{ .Data.data.redis_url }}"
    {{- end -}}

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    path: /metrics
    interval: 30s

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: analytics
          topologyKey: kubernetes.io/hostname
