# Helm values override for the Customer Delivery Experience service.
# Serves the public tracking page, reschedule flows, and delivery feedback.
# Read-heavy; Redis caching absorbs most tracking queries.
# Ref: services/delivery-experience — Rust + Redis

image:
  repository: ghcr.io/logisticos/delivery-experience
  pullPolicy: IfNotPresent
  tag: ""

replicaCount: 2

service:
  type: ClusterIP
  port: 8007
  grpcPort: 9007

env:
  - name: SERVICE_NAME
    value: delivery-experience
  - name: SERVICE_PORT
    value: "8007"
  - name: GRPC_PORT
    value: "9007"
  - name: LOG_LEVEL
    value: info
  - name: RUST_LOG
    value: "delivery_experience=info,tower_http=info"
  # Public tracking endpoint rate limit (requests/minute per IP).
  - name: PUBLIC_TRACKING_RATE_LIMIT
    value: "60"
  # Tracking data cache TTL in Redis (seconds).
  - name: TRACKING_CACHE_TTL_SECS
    value: "30"
  # Branded tracking page CDN base URL.
  - name: TRACKING_PAGE_CDN_URL
    value: https://track.logisticos.io

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

livenessProbe:
  httpGet:
    path: /health
    port: 8007
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8007
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

podAnnotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/role: "delivery-experience"
  vault.hashicorp.com/agent-inject-secret-config: "secret/data/logisticos/delivery-experience"
  vault.hashicorp.com/agent-inject-template-config: |
    {{- with secret "secret/data/logisticos/delivery-experience" -}}
    export DATABASE_URL="{{ .Data.data.database_url }}"
    export REDIS_URL="{{ .Data.data.redis_url }}"
    export KAFKA_BROKERS="{{ .Data.data.kafka_brokers }}"
    export MAPBOX_ACCESS_TOKEN="{{ .Data.data.mapbox_access_token }}"
    {{- end -}}

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    path: /metrics
    interval: 15s

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: delivery-experience
          topologyKey: kubernetes.io/hostname
