# Helm values override for the Proof of Delivery (POD) service.
# replicaCount=3 reflects high write volume: every delivery scan, photo upload,
# signature capture, and OTP confirmation hits this service.
# Ref: services/pod — Rust + PostgreSQL

image:
  repository: ghcr.io/logisticos/pod
  pullPolicy: IfNotPresent
  tag: ""

replicaCount: 3

service:
  type: ClusterIP
  port: 8011
  grpcPort: 9011

env:
  - name: SERVICE_NAME
    value: pod
  - name: SERVICE_PORT
    value: "8011"
  - name: GRPC_PORT
    value: "9011"
  - name: LOG_LEVEL
    value: info
  - name: RUST_LOG
    value: "pod=info,tower_http=info"
  # Object storage provider for POD photos and signature images.
  - name: OBJECT_STORAGE_PROVIDER
    value: s3
  # Maximum photo upload size in megabytes.
  - name: MAX_PHOTO_SIZE_MB
    value: "10"
  # Number of photos allowed per delivery task.
  - name: MAX_PHOTOS_PER_TASK
    value: "5"
  # OTP expiry in seconds.
  - name: OTP_EXPIRY_SECS
    value: "300"
  # Image compression quality (1–100) before storage.
  - name: IMAGE_COMPRESSION_QUALITY
    value: "85"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 150m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 25
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75

pdb:
  enabled: true
  minAvailable: 2

livenessProbe:
  httpGet:
    path: /health
    port: 8011
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8011
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

podAnnotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/role: "pod"
  vault.hashicorp.com/agent-inject-secret-config: "secret/data/logisticos/pod"
  vault.hashicorp.com/agent-inject-template-config: |
    {{- with secret "secret/data/logisticos/pod" -}}
    export DATABASE_URL="{{ .Data.data.database_url }}"
    export KAFKA_BROKERS="{{ .Data.data.kafka_brokers }}"
    export S3_ACCESS_KEY_ID="{{ .Data.data.s3_access_key_id }}"
    export S3_SECRET_ACCESS_KEY="{{ .Data.data.s3_secret_access_key }}"
    export S3_BUCKET="{{ .Data.data.s3_bucket }}"
    export S3_REGION="{{ .Data.data.s3_region }}"
    export REDIS_URL="{{ .Data.data.redis_url }}"
    {{- end -}}

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    path: /metrics
    interval: 15s

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app: pod

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: pod
          topologyKey: kubernetes.io/hostname
