# Helm values override for the Identity & Tenant Management service.
# Merged on top of the base-service chart defaults at deploy time.
# Ref: services/identity — Rust + PostgreSQL, OAuth 2.0 / OIDC, RBAC, multi-tenancy

image:
  repository: ghcr.io/logisticos/identity
  pullPolicy: IfNotPresent
  # Tag is overridden at deploy time by the CI/CD pipeline (image digest preferred).
  tag: ""

replicaCount: 3

service:
  type: ClusterIP
  port: 8001
  grpcPort: 9001

env:
  - name: SERVICE_NAME
    value: identity
  - name: SERVICE_PORT
    value: "8001"
  - name: GRPC_PORT
    value: "9001"
  - name: LOG_LEVEL
    value: info
  - name: RUST_LOG
    value: "identity=info,tower_http=info"

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# PodDisruptionBudget ensures ≥2 pods remain available during rolling updates.
pdb:
  enabled: true
  minAvailable: 2

livenessProbe:
  httpGet:
    path: /health
    port: 8001
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8001
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# Vault agent sidecar injects DATABASE_URL, JWT_SECRET, OAUTH_CLIENT_SECRET.
podAnnotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/role: "identity"
  vault.hashicorp.com/agent-inject-secret-config: "secret/data/logisticos/identity"
  vault.hashicorp.com/agent-inject-template-config: |
    {{- with secret "secret/data/logisticos/identity" -}}
    export DATABASE_URL="{{ .Data.data.database_url }}"
    export JWT_SECRET="{{ .Data.data.jwt_secret }}"
    export OAUTH_CLIENT_SECRET="{{ .Data.data.oauth_client_secret }}"
    {{- end -}}

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    path: /metrics
    interval: 15s

# Topology spread constraints for zone-aware scheduling.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app: identity

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: identity
          topologyKey: kubernetes.io/hostname
