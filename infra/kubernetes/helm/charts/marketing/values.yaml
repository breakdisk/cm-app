# Helm values override for the Marketing Automation Engine service.
# Handles campaign scheduling, audience segmentation, send-time optimisation,
# and A/B test orchestration powered by Kafka event streams.
# Ref: services/marketing — Rust + Kafka

image:
  repository: ghcr.io/logisticos/marketing
  pullPolicy: IfNotPresent
  tag: ""

replicaCount: 2

service:
  type: ClusterIP
  port: 8014
  grpcPort: 9014

env:
  - name: SERVICE_NAME
    value: marketing
  - name: SERVICE_PORT
    value: "8014"
  - name: GRPC_PORT
    value: "9014"
  - name: LOG_LEVEL
    value: info
  - name: RUST_LOG
    value: "marketing=info,tower_http=info"
  # Kafka consumer group for campaign trigger events.
  - name: KAFKA_CONSUMER_GROUP
    value: marketing-service
  # Maximum audience size for a single campaign dispatch batch.
  - name: CAMPAIGN_BATCH_SIZE
    value: "10000"
  # Send-time optimisation window in hours.
  - name: SEND_TIME_OPTIMISATION_WINDOW_HOURS
    value: "4"
  # A/B test holdout percentage (0–100).
  - name: DEFAULT_AB_HOLDOUT_PCT
    value: "20"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 15
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

livenessProbe:
  httpGet:
    path: /health
    port: 8014
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8014
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

podAnnotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/role: "marketing"
  vault.hashicorp.com/agent-inject-secret-config: "secret/data/logisticos/marketing"
  vault.hashicorp.com/agent-inject-template-config: |
    {{- with secret "secret/data/logisticos/marketing" -}}
    export DATABASE_URL="{{ .Data.data.database_url }}"
    export KAFKA_BROKERS="{{ .Data.data.kafka_brokers }}"
    export REDIS_URL="{{ .Data.data.redis_url }}"
    {{- end -}}

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    path: /metrics
    interval: 15s

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: marketing
          topologyKey: kubernetes.io/hostname
