# Helm values override for the Business Logic & Automation Engine service.
# Evaluates tenant-configured rules, triggers, dynamic pricing policies,
# and SLA enforcement workflows. Backed by Redis for hot rule cache.
# Ref: services/business-logic — Rust + Redis

image:
  repository: ghcr.io/logisticos/business-logic
  pullPolicy: IfNotPresent
  tag: ""

replicaCount: 2

service:
  type: ClusterIP
  port: 8015
  grpcPort: 9015

env:
  - name: SERVICE_NAME
    value: business-logic
  - name: SERVICE_PORT
    value: "8015"
  - name: GRPC_PORT
    value: "9015"
  - name: LOG_LEVEL
    value: info
  - name: RUST_LOG
    value: "business_logic=info,tower_http=info"
  # Rules engine evaluation mode: "sync" | "async_kafka"
  - name: RULES_ENGINE_MODE
    value: async_kafka
  # Rule definition cache TTL in seconds (5 minutes).
  - name: RULE_CACHE_TTL_SECS
    value: "300"
  # Maximum rule chain depth to prevent infinite loops.
  - name: MAX_RULE_CHAIN_DEPTH
    value: "20"
  # Dynamic pricing model: "fixed" | "zone_based" | "ai_dynamic"
  - name: PRICING_MODEL
    value: zone_based

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 15
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

livenessProbe:
  httpGet:
    path: /health
    port: 8015
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8015
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

podAnnotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/role: "business-logic"
  vault.hashicorp.com/agent-inject-secret-config: "secret/data/logisticos/business-logic"
  vault.hashicorp.com/agent-inject-template-config: |
    {{- with secret "secret/data/logisticos/business-logic" -}}
    export DATABASE_URL="{{ .Data.data.database_url }}"
    export KAFKA_BROKERS="{{ .Data.data.kafka_brokers }}"
    export REDIS_URL="{{ .Data.data.redis_url }}"
    {{- end -}}

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    path: /metrics
    interval: 15s

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: business-logic
          topologyKey: kubernetes.io/hostname
