# Helm values override for the Driver Operations service.
# hpa.maxReplicas=30 reflects high write volume from continuous driver location
# updates (~1 GPS fix/5s per active driver) and task status transitions.
# Ref: services/driver-ops — Rust + Redis + TimescaleDB

image:
  repository: ghcr.io/logisticos/driver-ops
  pullPolicy: IfNotPresent
  tag: ""

replicaCount: 3

service:
  type: ClusterIP
  port: 8006
  grpcPort: 9006

env:
  - name: SERVICE_NAME
    value: driver-ops
  - name: SERVICE_PORT
    value: "8006"
  - name: GRPC_PORT
    value: "9006"
  - name: LOG_LEVEL
    value: info
  - name: RUST_LOG
    value: "driver_ops=info,tower_http=info"
  # Location update write path uses Redis GEOADD for O(log N) spatial indexing.
  - name: LOCATION_STORE_BACKEND
    value: redis
  # Persist location to TimescaleDB for historical analysis every N seconds.
  - name: LOCATION_PERSIST_INTERVAL_SECS
    value: "30"
  # FCM batch size for driver instruction delivery.
  - name: FCM_BATCH_SIZE
    value: "500"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 150m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 30
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 75

pdb:
  enabled: true
  minAvailable: 2

livenessProbe:
  httpGet:
    path: /health
    port: 8006
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8006
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

podAnnotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/role: "driver-ops"
  vault.hashicorp.com/agent-inject-secret-config: "secret/data/logisticos/driver-ops"
  vault.hashicorp.com/agent-inject-template-config: |
    {{- with secret "secret/data/logisticos/driver-ops" -}}
    export DATABASE_URL="{{ .Data.data.database_url }}"
    export TIMESCALEDB_URL="{{ .Data.data.timescaledb_url }}"
    export REDIS_URL="{{ .Data.data.redis_url }}"
    export KAFKA_BROKERS="{{ .Data.data.kafka_brokers }}"
    export FCM_SERVICE_ACCOUNT_JSON="{{ .Data.data.fcm_service_account_json }}"
    export APNS_KEY="{{ .Data.data.apns_key }}"
    {{- end -}}

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    path: /metrics
    interval: 10s

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app: driver-ops

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: driver-ops
          topologyKey: kubernetes.io/hostname
