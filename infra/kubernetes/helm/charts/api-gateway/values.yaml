# Helm values override for the API Gateway & Integration Layer.
# This is the north-south traffic entry point; higher resource and replica
# settings reflect its role as the platform's traffic chokepoint.
# Ref: services/api-gateway — Rust (Axum + Envoy), Auth, Rate Limiting, Routing

image:
  repository: ghcr.io/logisticos/api-gateway
  pullPolicy: IfNotPresent
  tag: ""

replicaCount: 3

service:
  type: ClusterIP
  port: 8000
  grpcPort: 9000
  # Envoy admin interface (not exposed externally).
  envoyAdminPort: 9901

env:
  - name: SERVICE_NAME
    value: api-gateway
  - name: SERVICE_PORT
    value: "8000"
  - name: GRPC_PORT
    value: "9000"
  - name: LOG_LEVEL
    value: info
  - name: RUST_LOG
    value: "api_gateway=info,tower_http=info,hyper=warn"
  # Rate limiting backend.
  - name: RATE_LIMIT_BACKEND
    value: redis

resources:
  # Gateway handles all inbound traffic; headroom is essential.
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 30
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75

pdb:
  enabled: true
  minAvailable: 2

# Ingress is enabled only on the API Gateway — all other services are internal.
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.logisticos.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: api-gateway-tls
      hosts:
        - api.logisticos.io

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 8
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3

podAnnotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/role: "api-gateway"
  vault.hashicorp.com/agent-inject-secret-config: "secret/data/logisticos/api-gateway"
  vault.hashicorp.com/agent-inject-template-config: |
    {{- with secret "secret/data/logisticos/api-gateway" -}}
    export JWT_PUBLIC_KEY="{{ .Data.data.jwt_public_key }}"
    export RATE_LIMIT_REDIS_URL="{{ .Data.data.rate_limit_redis_url }}"
    export WEBHOOK_SIGNING_SECRET="{{ .Data.data.webhook_signing_secret }}"
    {{- end -}}

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    path: /metrics
    interval: 10s

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app: api-gateway

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app: api-gateway
        topologyKey: kubernetes.io/hostname
